<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Checkout | Furni</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet"
href="css/style.css">

<link rel="stylesheet"
href="css/checkout.css">

</head>

<body>

<!-- =========================
HEADER
========================= -->

<header class="header">

<div class="container">

<a href="index.html" class="logo">
Luxe<span>Cart</span>
</a>

<nav class="navbar">

<a href="index.html">Home</a>

<a href="shop.html">Shop</a>

<a href="cart.html">Cart</a>

<a href="checkout.html"
class="active">
Checkout
</a>

</nav>

</div>

</header>

<!-- =========================
CHECKOUT HERO
========================= -->

<section class="checkout-hero">

<div class="container">

<h1>Secure Checkout</h1>

<p>
Complete your order safely
and securely.
</p>

</div>

</section>

<!-- =========================
CHECKOUT SECTION
========================= -->

<section class="checkout-page">

<div class="container">

<div class="checkout-layout">

<!-- LEFT -->

<div class="checkout-form">

<h2>Billing Details</h2>

<form id="checkoutForm">

<div class="form-group">

<label>Full Name</label>

<input
type="text"
id="fullName"
required>

</div>

<div class="form-group">

<label>Email</label>

<input
type="email"
id="email"
required>

</div>

<div class="form-group">

<label>Phone</label>

<input
type="tel"
id="phone"
required>

</div>

<div class="form-group">

<label>Address</label>

<textarea
id="address"
required></textarea>

</div>

<div class="form-group">

<label>City</label>

<input
type="text"
id="city"
required>

</div>

<div class="form-group">

<label>Country</label>

<input
type="text"
id="country"
required>

</div>

<h3>Payment Method</h3>

<div class="payment-options">

<label>

<input
type="radio"
name="payment"
checked>

Cash On Delivery

</label>

<label>

<input
type="radio"
name="payment">

Credit Card

</label>

</div>

<button
type="submit"
class="place-order-btn">

Place Order

</button>

</form>

</div>

<!-- RIGHT -->

<div class="order-summary">

<h2>Order Summary</h2>

<div
id="checkoutItems">

</div>

<div class="summary-box">

<div class="summary-row">

<span>Subtotal</span>

<span id="checkoutSubtotal">
$0
</span>

</div>

<div class="summary-row">

<span>Shipping</span>

<span>$20</span>

</div>

<div class="summary-row">

<span>Tax</span>

<span id="checkoutTax">
$0
</span>

</div>

<hr>

<div
class="summary-row total">

<span>Total</span>

<span id="checkoutTotal">
$0
</span>

</div>

</div>

</div>

</div>

</div>

</section>

<script src="js/checkout.js"></script>

</body>
</html>
